<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cloop Loops</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap");
      :root {
        --bg: #f7f4ef;
        --bg-accent: #efe5d4;
        --ink: #2f2a24;
        --muted: #6e6357;
        --brand: #d66b3f;
        --card: #fffdf9;
        --border: #e3d8c8;
        --shadow: 0 10px 30px rgba(47, 42, 36, 0.12);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(1200px 600px at 20% -10%, var(--bg-accent), transparent),
          radial-gradient(900px 500px at 110% 10%, #f3e6d8, transparent),
          var(--bg);
        min-height: 100vh;
      }
      header {
        padding: 32px 20px 10px;
        text-align: center;
      }
      h1 {
        margin: 0 0 6px;
        font-family: "Space Grotesk", sans-serif;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      header p {
        margin: 0;
        color: var(--muted);
      }
      main {
        max-width: 820px;
        margin: 0 auto;
        padding: 16px 20px 40px;
        display: grid;
        gap: 18px;
      }
      .tabs {
        display: flex;
        justify-content: center;
        gap: 6px;
        margin: 16px 20px 0;
      }
      .tab {
        border: none;
        border-radius: 999px;
        padding: 8px 18px;
        background: var(--card);
        color: var(--muted);
        font-family: "Space Grotesk", sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid var(--border);
        transition: all 150ms ease;
      }
      .tab:hover {
        background: var(--bg-accent);
      }
      .tab.active {
        background: var(--brand);
        color: white;
        border-color: var(--brand);
      }
      .chat-main, .rag-main {
        max-width: 820px;
        margin: 0 auto;
        padding: 16px 20px 40px;
        display: none;
        gap: 18px;
      }
      .chat-panel {
        display: flex;
        flex-direction: column;
        min-height: 500px;
      }
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 16px;
        max-height: 60vh;
        padding: 4px;
      }
      .chat-bubble {
        max-width: 85%;
        padding: 12px 16px;
        border-radius: 16px;
        line-height: 1.5;
        animation: rise 200ms ease both;
      }
      .chat-bubble.user {
        align-self: flex-end;
        background: var(--brand);
        color: white;
        border-bottom-right-radius: 4px;
      }
      .chat-bubble.assistant {
        align-self: flex-start;
        background: #fff7ed;
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
      }
      .chat-form, .rag-form {
        display: flex;
        gap: 10px;
      }
      .chat-form input, .rag-form input {
        flex: 1;
        border-radius: 999px;
        border: 1px solid var(--border);
        padding: 10px 16px;
        font-size: 15px;
        font-family: inherit;
        background: #fffefb;
      }
      .chat-form input:focus, .rag-form input:focus {
        outline: none;
        border-color: var(--brand);
      }
      .rag-panel {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .rag-answer {
        background: #fff7ed;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        animation: rise 280ms ease both;
      }
      .rag-answer-text {
        line-height: 1.6;
        margin-bottom: 16px;
        white-space: pre-wrap;
      }
      .rag-sources h3 {
        margin: 0 0 10px;
        font-size: 14px;
        color: var(--muted);
        font-family: "Space Grotesk", sans-serif;
      }
      .rag-sources-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .rag-source {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 13px;
      }
      .rag-source-path {
        font-weight: 600;
        color: var(--ink);
        word-break: break-all;
      }
      .rag-source-meta {
        color: var(--muted);
        margin-top: 4px;
      }
      .rag-source-content {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px dashed var(--border);
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
        max-height: 80px;
        overflow-y: auto;
      }
      .chat-placeholder, .rag-placeholder {
        color: var(--muted);
        text-align: center;
        padding: 40px 20px;
        font-style: italic;
      }
      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 18px;
        box-shadow: var(--shadow);
        animation: rise 320ms ease both;
      }
      .panel h2 {
        margin: 0 0 12px;
        font-family: "Space Grotesk", sans-serif;
        font-size: 18px;
      }
      textarea {
        width: 100%;
        min-height: 110px;
        border-radius: 14px;
        border: 1px solid var(--border);
        padding: 12px 14px;
        font-size: 16px;
        font-family: inherit;
        resize: vertical;
        background: #fffefb;
      }
      .toggles {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin: 12px 0 6px;
      }
      .toggle {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #fff7ed;
        color: var(--muted);
        font-size: 13px;
      }
      .actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-top: 10px;
      }
      button {
        border: none;
        border-radius: 999px;
        padding: 10px 18px;
        background: var(--brand);
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      button.secondary {
        background: transparent;
        color: var(--brand);
        border: 1px solid var(--brand);
      }
      .inbox-list {
        display: grid;
        gap: 12px;
      }
      .loop-card {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px 14px;
        background: #fffefc;
        display: grid;
        gap: 6px;
        animation: rise 360ms ease both;
      }
      .loop-title {
        font-weight: 600;
      }
      .title-input {
        border: none;
        background: transparent;
        font-family: "Space Grotesk", sans-serif;
        font-weight: 600;
        font-size: 18px;
        color: var(--ink);
        padding: 0;
        margin: 0;
      }
      .title-input::placeholder {
        color: var(--muted);
      }
      .title-input:focus {
        outline: none;
        background: #fffefb;
        border-radius: 8px;
        padding: 2px 6px;
      }
      .loop-summary {
        color: var(--muted);
        font-size: 14px;
      }
      .badges {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .badge {
        font-size: 12px;
        padding: 4px 8px;
        border-radius: 999px;
        background: #f4efe6;
        color: var(--muted);
        border: 1px solid var(--border);
      }
      .badge.pending {
        background: #fff1dc;
        color: #8f5a2a;
        border-color: #f1caa0;
      }
      .badge.complete {
        background: #e6f4e6;
        color: #2d6b34;
        border-color: #b8e0bc;
      }
      .badge.failed {
        background: #ffe3e3;
        color: #8a2a2a;
        border-color: #f1b3b3;
      }
      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .tag {
        font-size: 12px;
        padding: 4px 8px;
        border-radius: 999px;
        background: #f8efe3;
        border: 1px solid var(--border);
        cursor: default;
      }
      .tag-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        cursor: default;
      }
      .tags {
        cursor: default;
      }
      .tag-text {
        cursor: default;
      }
      .tag-remove {
        border: none;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font-size: 12px;
        line-height: 1;
        padding: 0;
        opacity: 0;
        transition: opacity 120ms ease;
      }
      .tag-chip:hover .tag-remove {
        opacity: 1;
      }
      .tags-edit {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
      }
      .tags-edit .tag-input {
        display: none;
      }
      .tags-edit.editing .tag-input {
        display: inline-flex;
        min-width: 140px;
      }
      .tags-edit.editing .tag-add {
        display: none;
      }
      .tag-add {
        border: 1px dashed var(--border);
        background: #fffefb;
        color: var(--muted);
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 12px;
        cursor: pointer;
      }
      .completion-cancel {
        border: 1px dashed var(--border);
        background: #fffefb;
        color: var(--muted);
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 12px;
        cursor: pointer;
        line-height: 1;
      }
      .loop-meta {
        color: var(--muted);
        font-size: 13px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .loop-actions {
        display: flex;
        gap: 8px;
        margin-top: 6px;
      }
      .completion-note-row {
        display: none;
        margin-top: 6px;
      }
      .completion-note-row.visible {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 6px;
        align-items: center;
      }
      .completion-note-row .inline-label {
        grid-column: 1 / -1;
      }
      .completion-note-row .completion-cancel {
        display: none;
      }
      .completion-note-row.completing .completion-cancel {
        display: inline-flex;
      }
      .completion-note-input {
        font-size: 13px;
      }
      .blocked-reason-row {
        display: none;
      }
      .blocked-reason-row.visible {
        display: grid;
        gap: 4px;
      }
      .inline-row {
        display: grid;
        gap: 4px;
      }
      .inline-label {
        font-size: 12px;
        color: var(--muted);
      }
      .inline-input {
        border: 1px dashed transparent;
        border-radius: 10px;
        padding: 6px 8px;
        font-family: inherit;
        background: transparent;
        font-size: 14px;
        color: var(--ink);
        width: 100%;
      }
      .inline-input::placeholder {
        color: var(--muted);
      }
      .inline-input:focus {
        outline: none;
        border-color: var(--brand);
        background: #fffefb;
      }
      .inline-textarea {
        resize: none;
        overflow: hidden;
        min-height: 32px;
        height: auto;
        line-height: 1.4;
      }
      .badge-select {
        appearance: none;
        background: #f4efe6;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 4px 18px 4px 8px;
        font-size: 12px;
        cursor: pointer;
      }
      .badge-input {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 12px;
        background: #f4efe6;
        color: var(--muted);
      }
      .tag-input {
        border: 1px dashed transparent;
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 12px;
        background: #f8efe3;
        color: var(--ink);
      }
      .tag-input:focus {
        outline: none;
        border-color: var(--brand);
        background: #fffefb;
      }
      .filters {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }
      .filters label {
        font-size: 13px;
        color: var(--muted);
      }
      .footer-actions {
        max-width: 820px;
        margin: 16px auto 40px;
        padding: 0 20px;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        opacity: 0.65;
      }
      select {
        border-radius: 999px;
        border: 1px solid var(--border);
        padding: 6px 12px;
        background: #fffefb;
        font-family: inherit;
      }
      .next-main {
        max-width: 820px;
        margin: 0 auto;
        padding: 16px 20px 40px;
        display: none;
        gap: 18px;
      }
      .next-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .next-header h2 {
        margin: 0;
      }
      .next-buckets {
        display: grid;
        gap: 20px;
      }
      .next-bucket {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        box-shadow: var(--shadow);
        animation: rise 320ms ease both;
      }
      .next-bucket-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border);
      }
      .next-bucket-icon {
        font-size: 20px;
      }
      .next-bucket-title {
        font-family: "Space Grotesk", sans-serif;
        font-size: 16px;
        font-weight: 600;
        margin: 0;
      }
      .next-bucket-count {
        font-size: 12px;
        color: var(--muted);
        background: var(--bg-accent);
        padding: 2px 8px;
        border-radius: 999px;
      }
      .next-bucket-list {
        display: grid;
        gap: 10px;
      }
      .next-bucket-empty {
        color: var(--muted);
        font-style: italic;
        font-size: 14px;
        padding: 10px 0;
      }
      /* Bucket-specific colors */
      .bucket-due_soon .next-bucket-header { border-left: 4px solid #e74c3c; padding-left: 12px; }
      .bucket-quick_wins .next-bucket-header { border-left: 4px solid #27ae60; padding-left: 12px; }
      .bucket-high_leverage .next-bucket-header { border-left: 4px solid #f39c12; padding-left: 12px; }
      .bucket-standard .next-bucket-header { border-left: 4px solid var(--muted); padding-left: 12px; }
      /* Priority indicators */
      .priority-score {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 11px;
        padding: 2px 6px;
        border-radius: 4px;
        background: #f4efe6;
      }
      .priority-urgency { color: #c0392b; }
      .priority-importance { color: #d68910; }
      .priority-energy { color: #27ae60; }

      /* Timer styles */
      .timer-btn {
        background: none;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 4px 10px;
        cursor: pointer;
        font-size: 13px;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .timer-btn:hover {
        background: var(--bg-accent);
        border-color: var(--brand);
      }
      .timer-btn.running {
        background: var(--brand);
        color: white;
        border-color: var(--brand);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
      .timer-display {
        font-family: "Space Grotesk", monospace;
        font-size: 13px;
        color: var(--muted);
        min-width: 50px;
        display: inline-block;
      }
      .timer-display.active {
        color: var(--brand);
        font-weight: 600;
      }
      .timer-section {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 0;
        border-top: 1px dashed var(--border);
        margin-top: 6px;
      }
      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @media (max-width: 640px) {
        main {
          padding: 10px 14px 30px;
        }
        .actions {
          flex-direction: column;
          align-items: stretch;
        }
        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Cloop Loops</h1>
      <p>Capture fast. Organize later.</p>
    </header>
    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="inbox" role="tab" aria-selected="true">Inbox</button>
      <button class="tab" data-tab="next" role="tab" aria-selected="false">Next</button>
      <button class="tab" data-tab="chat" role="tab" aria-selected="false">Chat</button>
      <button class="tab" data-tab="rag" role="tab" aria-selected="false">RAG</button>
    </nav>
    <main id="inbox-main">
      <section class="panel">
        <h2>Quick capture</h2>
        <form id="capture-form">
          <textarea id="raw-text" placeholder="Drop a loop, idea, or task..." required></textarea>
          <div class="toggles">
            <label class="toggle">
              <input type="checkbox" id="actionable">
              Actionable
            </label>
            <label class="toggle">
              <input type="checkbox" id="scheduled">
              Scheduled
            </label>
            <label class="toggle">
              <input type="checkbox" id="blocked">
              Blocked
            </label>
          </div>
          <div class="actions">
            <span id="status" class="loop-meta">Ready.</span>
            <button type="submit">Save</button>
          </div>
        </form>
      </section>
      <section class="panel">
        <h2>Inbox</h2>
        <div class="filters">
          <label for="query-filter">query:</label>
          <input
            type="text"
            id="query-filter"
            class="query-input"
            placeholder="e.g., status:inbox due:today"
            style="flex: 1; min-width: 200px; border-radius: 999px; border: 1px solid var(--border); padding: 6px 12px; background: #fffefb; font-family: inherit;"
          >
        </div>
        <div class="filters">
          <label for="status-filter">show:</label>
          <select id="status-filter">
            <option value="open" selected>open</option>
            <option value="inbox">inbox</option>
            <option value="actionable">actionable</option>
            <option value="blocked">blocked</option>
            <option value="scheduled">scheduled</option>
            <option value="completed">completed</option>
            <option value="dropped">dropped</option>
            <option value="all">all</option>
          </select>
          <label for="tag-filter">tag:</label>
          <select id="tag-filter">
            <option value="" selected>all tags</option>
          </select>
          <label for="view-filter">view:</label>
          <select id="view-filter">
            <option value="" selected>-</option>
          </select>
          <button class="tag-add" type="button" id="save-view-btn" style="padding: 4px 8px; font-size: 12px;">save</button>
        </div>
        <div id="inbox" class="inbox-list"></div>
      </section>
    </main>
    <main class="chat-main" id="chat-main">
      <section class="panel chat-panel">
        <h2>Chat</h2>
        <div id="chat-messages" class="chat-messages" role="log" aria-live="polite" aria-label="Chat conversation">
          <div class="chat-placeholder">Start a conversation...</div>
        </div>
        <form id="chat-form" class="chat-form">
          <input
            type="text"
            id="chat-input"
            placeholder="Type a message..."
            autocomplete="off"
            required
          >
          <button type="submit">Send</button>
        </form>
      </section>
    </main>
    <main class="next-main" id="next-main">
      <section class="panel">
        <div class="next-header">
          <h2>What should I do now?</h2>
          <button class="secondary" id="refresh-next-btn" type="button">Refresh</button>
        </div>
        <div id="next-buckets" class="next-buckets">
          <!-- Buckets rendered by JavaScript -->
        </div>
      </section>
    </main>
    <main class="rag-main" id="rag-main">
      <section class="panel rag-panel">
        <h2>Ask Your Knowledge Base</h2>
        <form id="rag-form" class="rag-form">
          <input
            type="text"
            id="rag-input"
            placeholder="Ask a question about your documents..."
            autocomplete="off"
            required
          >
          <button type="submit">Ask</button>
        </form>
        <div id="rag-answer" class="rag-answer" style="display: none;" role="region" aria-live="polite" aria-label="RAG answer">
          <div class="rag-answer-text"></div>
          <div class="rag-sources">
            <h3>Sources</h3>
            <div class="rag-sources-list"></div>
          </div>
        </div>
      </section>
    </main>
    <div class="footer-actions">
      <button class="tag-add" type="button" id="export-btn">export</button>
      <button class="tag-add" type="button" id="import-btn">import</button>
      <input type="file" id="import-file" accept="application/json" hidden>
    </div>
    <script>
      const inbox = document.getElementById("inbox");
      const nextBuckets = document.getElementById("next-buckets");
      const refreshNextBtn = document.getElementById("refresh-next-btn");
      const nextMain = document.getElementById("next-main");
      const status = document.getElementById("status");
      const form = document.getElementById("capture-form");
      const rawText = document.getElementById("raw-text");
      const actionable = document.getElementById("actionable");
      const scheduled = document.getElementById("scheduled");
      const blocked = document.getElementById("blocked");
      const statusFilter = document.getElementById("status-filter");
      const tagFilter = document.getElementById("tag-filter");
      const queryFilter = document.getElementById("query-filter");
      const viewFilter = document.getElementById("view-filter");
      const saveViewBtn = document.getElementById("save-view-btn");
      const exportBtn = document.getElementById("export-btn");
      const importBtn = document.getElementById("import-btn");
      const importFile = document.getElementById("import-file");
      const statusOptions = [
        "inbox",
        "actionable",
        "blocked",
        "scheduled",
        "completed",
        "dropped",
      ];

      function formatTime(value) {
        try {
          return new Date(value).toLocaleString();
        } catch {
          return value;
        }
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function toLocalInputValue(isoValue) {
        if (!isoValue) return "";
        const date = new Date(isoValue);
        if (Number.isNaN(date.getTime())) return "";
        const offsetMs = date.getTimezoneOffset() * 60000;
        return new Date(date.getTime() - offsetMs).toISOString().slice(0, 16);
      }

      function isoFromLocalInput(value) {
        if (!value) return null;
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return null;
        return date.toISOString();
      }

      function normalizeTags(value) {
        if (!value) return [];
        return value
          .split(",")
          .map((tag) => tag.trim())
          .filter(Boolean);
      }

      function autoResizeTextarea(textarea) {
        textarea.style.height = "0px";
        textarea.style.height = `${textarea.scrollHeight}px`;
      }

      function queueNextActionResize(root) {
        const targets = root.querySelectorAll
          ? root.querySelectorAll('[data-field="next_action"]')
          : [];
        requestAnimationFrame(() => {
          targets.forEach(autoResizeTextarea);
        });
      }

      function statusSelectOptions(current) {
        return statusOptions
          .map(
            (status) =>
              `<option value="${status}" ${status === current ? "selected" : ""}>${status}</option>`,
          )
          .join("");
      }

      function renderLoop(loop) {
        const card = document.createElement("div");
        card.className = "loop-card";
        card.dataset.loopId = loop.id;
        card.dataset.status = loop.status;
        const title = loop.title || loop.raw_text;
        const summary = loop.summary || loop.definition_of_done || "";
        const nextAction = loop.next_action || "";
        const closed = loop.closed_at_utc ? `Closed: ${formatTime(loop.closed_at_utc)}` : "";
        const completionNoteValue = loop.completion_note || "";
        const completionVisible =
          loop.status === "completed" || Boolean(completionNoteValue.trim());
        const tagChips = Array.isArray(loop.tags) && loop.tags.length
          ? loop.tags
              .map(
                (tag) => `
                  <span class="tag tag-chip" data-tag="${escapeHtml(tag)}">
                    <span class="tag-text">${escapeHtml(tag)}</span>
                    <button
                      class="tag-remove"
                      type="button"
                      data-action="remove-tag"
                      data-tag="${escapeHtml(tag)}"
                    >
                      x
                    </button>
                  </span>
                `,
              )
              .join("")
          : "";
        const tags = `
          <div class="tags-edit">
            <div class="tags tags-chips">${tagChips}</div>
            <button class="tag-add" type="button" data-action="edit-tags">+ add</button>
            <input
              class="tag-input"
              type="text"
              data-field="tags_add"
              placeholder="tag1, tag2"
            >
          </div>
        `;
        const enrichmentState = loop.enrichment_state || "idle";
        const enrichmentLabel =
          enrichmentState === "pending"
            ? "Enrichment pending"
            : enrichmentState === "complete"
              ? "Enrichment complete"
              : enrichmentState === "failed"
                ? "Enrichment failed"
                : "Enrichment idle";
        card.innerHTML = `
          <input
            class="title-input"
            type="text"
            data-field="title"
            placeholder="Untitled"
          >
          <div class="loop-meta">
            <span>Captured: ${formatTime(loop.captured_at_utc)}</span>
            <span>Updated: ${formatTime(loop.updated_at_utc)}</span>
          </div>
          ${summary ? `<div class="loop-summary">${escapeHtml(summary)}</div>` : ""}
          <div class="inline-row">
            <span class="inline-label">Next action</span>
            <textarea
              class="inline-input inline-textarea"
              rows="1"
              data-field="next_action"
              placeholder="Add next action"
            ></textarea>
          </div>
          <div class="badges">
            <select class="badge-select" data-field="status">
              ${statusSelectOptions(loop.status)}
            </select>
            <input
              class="badge-input"
              type="datetime-local"
              data-field="due_at_utc"
              placeholder="Due"
            >
            ${closed ? `<span class="badge">${closed}</span>` : ""}
            <span class="badge ${enrichmentState}">${enrichmentLabel}</span>
          </div>
          ${tags}
          <div class="blocked-reason-row ${loop.status === "blocked" ? "visible" : ""}">
            <span class="inline-label">Blocked by</span>
            <input
              class="inline-input"
              type="text"
              data-field="blocked_reason"
              placeholder="What's blocking this?"
            >
          </div>
          <div class="timer-section">
          <button class="timer-btn ${loop.timer_running ? 'running' : ''}" data-action="timer-toggle" data-id="${loop.id}" data-running="${loop.timer_running ? 'true' : 'false'}">
            ${loop.timer_running ? '⏹ Stop' : '▶ Start'}
          </button>
          <span class="timer-display ${loop.timer_running ? 'active' : ''}" data-timer-display="${loop.id}">
            ${loop.timer_display || ''}
          </span>
          ${loop.total_tracked_minutes ? `<span class="badge">${loop.total_tracked_minutes}m tracked</span>` : ''}
          ${loop.time_minutes ? `<span class="badge pending">est: ${loop.time_minutes}m</span>` : ''}
        </div>
        <div class="loop-actions">
          <button class="secondary" data-action="complete" data-id="${loop.id}">
            Complete
          </button>
          <button class="secondary" data-action="enrich" data-id="${loop.id}">Enrich</button>
          <button class="secondary" data-action="refresh" data-id="${loop.id}">Refresh</button>
        </div>
          <div class="completion-note-row ${completionVisible ? "visible" : ""}">
            <span class="inline-label">completion note</span>
            <input
              class="inline-input completion-note-input"
              type="text"
              placeholder="Add a note (optional)"
              data-action="completion-note"
            >
            <button class="completion-cancel" data-action="cancel-complete" data-id="${loop.id}">
              ×
            </button>
          </div>
        `;
        const titleInput = card.querySelector('[data-field="title"]');
        const tagsInput = card.querySelector('[data-field="tags_add"]');
        const nextInput = card.querySelector('[data-field="next_action"]');
        const dueInput = card.querySelector('[data-field="due_at_utc"]');
        const statusSelect = card.querySelector('[data-field="status"]');
        if (titleInput) {
          titleInput.value = title;
          titleInput.dataset.initial = title;
        }
        if (tagsInput) {
          tagsInput.value = "";
        }
        if (nextInput) {
          nextInput.value = loop.next_action || "";
          nextInput.dataset.initial = loop.next_action || "";
          autoResizeTextarea(nextInput);
        }
        if (dueInput) {
          dueInput.value = toLocalInputValue(loop.due_at_utc);
          dueInput.dataset.initial = loop.due_at_utc || "";
        }
        if (statusSelect) {
          statusSelect.dataset.initial = loop.status;
        }
        const blockedInput = card.querySelector('[data-field="blocked_reason"]');
        if (blockedInput) {
          blockedInput.value = loop.blocked_reason || "";
          blockedInput.dataset.initial = loop.blocked_reason || "";
        }
        const completionInput = card.querySelector(".completion-note-input");
        if (completionInput) {
          completionInput.value = completionNoteValue;
          completionInput.dataset.initial = completionNoteValue;
          completionInput.dataset.mode = completionVisible ? "edit" : "";
        }
        return card;
      }

      function replaceLoop(loop) {
        const existing = inbox.querySelector(`[data-loop-id="${loop.id}"]`);
        const rendered = renderLoop(loop);
        if (existing) {
          existing.replaceWith(rendered);
        } else {
          inbox.prepend(rendered);
        }
        queueNextActionResize(rendered);
      }

      async function loadInbox() {
        const queryValue = queryFilter.value.trim();
        let data;

        if (queryValue) {
          const response = await fetch("/loops/search", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ query: queryValue, limit: 50, offset: 0 }),
          });
          if (!response.ok) {
            status.textContent = "Failed to search loops.";
            return;
          }
          const result = await response.json();
          data = result.items;
        } else {
          const statusValue = statusFilter.value;
          const url = new URL("/loops", window.location.origin);
          url.searchParams.set("status", statusValue);
          if (tagFilter.value) {
            url.searchParams.set("tag", tagFilter.value);
          }
          const response = await fetch(url.toString());
          if (!response.ok) {
            status.textContent = "Failed to load inbox.";
            return;
          }
          data = await response.json();
        }

        inbox.innerHTML = "";
        data.forEach((loop) => inbox.appendChild(renderLoop(loop)));
        queueNextActionResize(inbox);
        await loadTags();
        await loadViews();
        // Load timer statuses after loops are rendered
        await loadAllTimerStatuses();
      }

      // Timer state management
      const activeTimers = new Map(); // loop_id -> { session_id, started_at, interval_id }

      async function loadTimerStatus(loopId) {
        try {
          const response = await fetch(`/loops/${loopId}/timer/status`);
          if (!response.ok) return null;
          return await response.json();
        } catch (e) {
          console.warn("Failed to load timer status:", e);
          return null;
        }
      }

      function formatDuration(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        if (mins === 0) return `${secs}s`;
        return `${mins}m ${secs.toString().padStart(2, '0')}s`;
      }

      function updateTimerDisplay(loopId, elapsedSeconds) {
        const display = document.querySelector(`[data-timer-display="${loopId}"]`);
        if (display) {
          display.textContent = formatDuration(elapsedSeconds);
        }
      }

      function startTimerUI(loopId, timerData) {
        // Clear any existing timer
        stopTimerUI(loopId);

        const btn = document.querySelector(`button[data-action="timer-toggle"][data-id="${loopId}"]`);
        const display = document.querySelector(`[data-timer-display="${loopId}"]`);

        if (btn) {
          btn.classList.add('running');
          btn.textContent = '⏹ Stop';
          btn.dataset.running = 'true';
        }
        if (display) {
          display.classList.add('active');
        }

        // Calculate elapsed time
        const startedAt = new Date(timerData.active_session?.started_at_utc || timerData.started_at_utc);
        const updateDisplay = () => {
          const elapsed = Math.floor((Date.now() - startedAt.getTime()) / 1000);
          updateTimerDisplay(loopId, elapsed);
        };

        // Update immediately and then every second
        updateDisplay();
        const intervalId = setInterval(updateDisplay, 1000);

        activeTimers.set(loopId, {
          session_id: timerData.active_session?.id || timerData.session_id,
          started_at: startedAt,
          interval_id: intervalId
        });
      }

      function stopTimerUI(loopId) {
        const timer = activeTimers.get(loopId);
        if (timer) {
          clearInterval(timer.interval_id);
          activeTimers.delete(loopId);
        }

        const btn = document.querySelector(`button[data-action="timer-toggle"][data-id="${loopId}"]`);
        const display = document.querySelector(`[data-timer-display="${loopId}"]`);

        if (btn) {
          btn.classList.remove('running');
          btn.textContent = '▶ Start';
          btn.dataset.running = 'false';
        }
        if (display) {
          display.classList.remove('active');
          // Keep the last displayed time
        }
      }

      async function toggleTimer(loopId) {
        const btn = document.querySelector(`button[data-action="timer-toggle"][data-id="${loopId}"]`);
        const isRunning = btn && btn.dataset.running === 'true';

        try {
          if (isRunning) {
            // Stop timer
            const response = await fetch(`/loops/${loopId}/timer/stop`, {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify({})
            });
            if (response.ok) {
              const session = await response.json();
              stopTimerUI(loopId);
              status.textContent = `Timer stopped: ${formatDuration(session.duration_seconds || 0)}`;
              // Refresh loop to update tracked time display
              await refreshLoop(loopId);
            } else {
              const error = await response.json();
              status.textContent = error.detail?.message || "Failed to stop timer.";
            }
          } else {
            // Start timer
            const response = await fetch(`/loops/${loopId}/timer/start`, {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
            });
            if (response.ok) {
              const session = await response.json();
              startTimerUI(loopId, { active_session: session });
              status.textContent = "Timer started.";
            } else if (response.status === 409) {
              status.textContent = "Timer already running for this loop.";
              // Reload timer status
              const timerStatus = await loadTimerStatus(loopId);
              if (timerStatus?.has_active_session) {
                startTimerUI(loopId, timerStatus);
              }
            } else {
              const error = await response.json();
              status.textContent = error.detail || "Failed to start timer.";
            }
          }
        } catch (e) {
          console.error("Timer error:", e);
          status.textContent = "Timer operation failed.";
        }
      }

      // Load timer status for all visible loops
      async function loadAllTimerStatuses() {
        const cards = inbox.querySelectorAll('.loop-card');
        for (const card of cards) {
          const loopId = card.dataset.loopId;
          if (!loopId) continue;

          const timerStatus = await loadTimerStatus(loopId);
          if (timerStatus?.has_active_session && timerStatus.active_session) {
            startTimerUI(loopId, timerStatus);
          }
        }
      }

      async function refreshLoop(loopId) {
        const response = await fetch(`/loops/${loopId}`);
        if (!response.ok) {
          status.textContent = "Failed to refresh loop.";
          return;
        }
        const loop = await response.json();

        // Check timer status
        const timerStatus = await loadTimerStatus(loopId);
        loop.timer_running = timerStatus?.has_active_session || false;
        loop.timer_display = '';
        if (timerStatus?.has_active_session && timerStatus.active_session) {
          const elapsed = timerStatus.active_session.elapsed_seconds ||
            Math.floor((Date.now() - new Date(timerStatus.active_session.started_at_utc).getTime()) / 1000);
          loop.timer_display = formatDuration(elapsed);
        }
        loop.total_tracked_minutes = timerStatus ? Math.floor(timerStatus.total_tracked_seconds / 60) : 0;

        replaceLoop(loop);

        // Restore timer UI if running
        if (timerStatus?.has_active_session) {
          startTimerUI(loopId, timerStatus);
        }
      }

      function pollLoop(loopId, attempt = 0) {
        if (attempt > 10) return;
        setTimeout(async () => {
          const response = await fetch(`/loops/${loopId}`);
          if (!response.ok) return;
          const loop = await response.json();
          replaceLoop(loop);
          if (loop.enrichment_state === "pending") {
            pollLoop(loopId, attempt + 1);
          }
        }, 1500);
      }

      async function captureLoop(event) {
        event.preventDefault();
        status.textContent = "Saving...";
        const now = new Date();
        const payload = {
          raw_text: rawText.value.trim(),
          captured_at: now.toISOString(),
          client_tz_offset_min: -now.getTimezoneOffset(),
          actionable: actionable.checked,
          scheduled: scheduled.checked,
          blocked: blocked.checked,
        };
        if (!payload.raw_text) {
          status.textContent = "Type something first.";
          return;
        }
        const response = await fetch("/loops/capture", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!response.ok) {
          status.textContent = "Capture failed. Check server logs and .env.";
          return;
        }
        const loop = await response.json();
        replaceLoop(loop);
        pollLoop(loop.id);
        rawText.value = "";
        actionable.checked = false;
        scheduled.checked = false;
        blocked.checked = false;
        status.textContent = "Saved. Enrichment queued.";
      }

      function showCompletionNote(loopId) {
        const card = inbox.querySelector(`[data-loop-id="${loopId}"]`);
        if (!card) return;
        const noteRow = card.querySelector(".completion-note-row");
        if (noteRow) {
          noteRow.classList.add("visible");
          noteRow.classList.add("completing");
          const input = noteRow.querySelector(".completion-note-input");
          if (input) {
            input.dataset.mode = "complete";
            input.value = input.dataset.initial || "";
            input.focus();
          }
        }
      }

      function hideCompletionNote(loopId) {
        const card = inbox.querySelector(`[data-loop-id="${loopId}"]`);
        if (!card) return;
        const noteRow = card.querySelector(".completion-note-row");
        if (!noteRow) return;
        const input = noteRow.querySelector(".completion-note-input");
        noteRow.classList.remove("completing");
        if (input) {
          input.dataset.mode = "edit";
          input.value = input.dataset.initial || "";
          const statusSelect = card.querySelector('[data-field="status"]');
          const currentStatus = statusSelect ? statusSelect.value : card.dataset.status;
          const pinned =
            currentStatus === "completed" || Boolean(input.dataset.initial?.trim());
          if (card.dataset.pendingStatus === "completed") {
            const previous = card.dataset.previousStatus || "";
            if (statusSelect && previous) {
              statusSelect.value = previous;
              statusSelect.dataset.initial = previous;
            }
            if (previous) {
              card.dataset.status = previous;
            }
            delete card.dataset.pendingStatus;
            delete card.dataset.previousStatus;
          }
          if (!pinned) {
            noteRow.classList.remove("visible");
          }
        } else {
          noteRow.classList.remove("visible");
        }
      }

      async function saveCompletionNote(loopId, input) {
        const noteValue = input.value.trim();
        const initialValue = input.dataset.initial || "";
        if (noteValue === initialValue) return;
        const updated = await patchLoop(loopId, {
          completion_note: noteValue || null,
        });
        if (updated) {
          replaceLoop(updated);
        }
      }

      async function confirmComplete(loopId, note) {
        const payload = { status: "completed" };
        if (note && note.trim()) {
          payload.note = note.trim();
        }
        const response = await fetch(`/loops/${loopId}/status`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!response.ok) {
          status.textContent = "Failed to close loop.";
          return;
        }
        const updated = await response.json();
        const filterValue = statusFilter.value;
        const shouldHide =
          filterValue === "open" ||
          (filterValue && filterValue !== "all" && filterValue !== "completed");
        if (shouldHide) {
          const card = inbox.querySelector(`[data-loop-id="${loopId}"]`);
          card?.remove();
          return;
        }
        replaceLoop(updated);
      }

      async function transitionStatus(loopId, nextStatus) {
        const response = await fetch(`/loops/${loopId}/status`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ status: nextStatus }),
        });
        if (!response.ok) {
          status.textContent = "Failed to update status.";
          return null;
        }
        return await response.json();
      }

      async function patchLoop(loopId, payload) {
        const response = await fetch(`/loops/${loopId}`, {
          method: "PATCH",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!response.ok) {
          status.textContent = "Failed to update loop.";
          return null;
        }
        return await response.json();
      }

      async function loadTags() {
        const response = await fetch("/loops/tags");
        if (!response.ok) {
          return;
        }
        const tags = await response.json();
        const selected = tagFilter.value;
        tagFilter.innerHTML = '<option value="">all tags</option>';
        tags.forEach((tag) => {
          const option = document.createElement("option");
          option.value = tag;
          option.textContent = tag;
          tagFilter.appendChild(option);
        });
        if (selected && tags.includes(selected)) {
          tagFilter.value = selected;
        }
      }

      async function loadViews() {
        const response = await fetch("/loops/views");
        if (!response.ok) {
          return;
        }
        const views = await response.json();
        const selected = viewFilter.value;
        viewFilter.innerHTML = '<option value="">-</option>';
        views.forEach((view) => {
          const option = document.createElement("option");
          option.value = view.id;
          option.textContent = view.name;
          option.dataset.query = view.query;
          viewFilter.appendChild(option);
        });
        if (selected && views.some((v) => String(v.id) === selected)) {
          viewFilter.value = selected;
        }
      }

      async function saveCurrentView() {
        const query = queryFilter.value.trim();
        if (!query) {
          status.textContent = "Enter a query first.";
          return;
        }
        const name = prompt("View name:", "");
        if (!name || !name.trim()) {
          return;
        }
        const response = await fetch("/loops/views", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ name: name.trim(), query }),
        });
        if (!response.ok) {
          const error = await response.json();
          status.textContent = error.detail || "Failed to save view.";
          return;
        }
        status.textContent = "View saved.";
        await loadViews();
      }

      function downloadExport(payload) {
        const blob = new Blob([JSON.stringify(payload, null, 2)], {
          type: "application/json",
        });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        const stamp = new Date().toISOString().replace(/[:.]/g, "-");
        anchor.download = `cloop-loops-${stamp}.json`;
        anchor.click();
        URL.revokeObjectURL(url);
      }

      async function exportLoops() {
        status.textContent = "Exporting...";
        const response = await fetch("/loops/export");
        if (!response.ok) {
          status.textContent = "Export failed.";
          return;
        }
        const payload = await response.json();
        downloadExport(payload);
        status.textContent = "Exported.";
      }

      async function importLoops(file) {
        status.textContent = "Importing...";
        const text = await file.text();
        let payload;
        try {
          payload = JSON.parse(text);
        } catch {
          status.textContent = "Invalid JSON file.";
          return;
        }
        const loops = Array.isArray(payload) ? payload : payload.loops || [];
        const response = await fetch("/loops/import", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ loops }),
        });
        if (!response.ok) {
          status.textContent = "Import failed.";
          return;
        }
        const result = await response.json();
        status.textContent = `Imported ${result.imported} loops.`;
        await loadTags();
        await loadInbox();
      }

      function getTagsFromCard(card) {
        return Array.from(card.querySelectorAll(".tag-chip"))
          .map((chip) => chip.dataset.tag || "")
          .filter(Boolean);
      }

      async function appendTagsFromInput(input) {
        const card = input.closest(".loop-card");
        const tagsWrap = input.closest(".tags-edit");
        if (!card || !tagsWrap) return;
        const newTags = normalizeTags(input.value);
        input.value = "";
        tagsWrap.classList.remove("editing");
        if (!newTags.length) return;
        const existing = getTagsFromCard(card);
        const combined = [...existing];
        newTags.forEach((tag) => {
          if (!combined.includes(tag)) {
            combined.push(tag);
          }
        });
        if (
          combined.length === existing.length &&
          combined.every((tag, index) => tag === existing[index])
        ) {
          return;
        }
        const updated = await patchLoop(card.dataset.loopId, { tags: combined });
        if (updated) {
          replaceLoop(updated);
          await loadTags();
        }
      }

      async function removeTag(loopId, tag, card) {
        const existing = getTagsFromCard(card);
        const updatedTags = existing.filter((value) => value !== tag);
        if (updatedTags.length === existing.length) return;
        const updated = await patchLoop(loopId, { tags: updatedTags });
        if (updated) {
          replaceLoop(updated);
          await loadTags();
        }
      }

      async function applyInlineUpdate(target) {
        const card = target.closest(".loop-card");
        if (!card) return;
        const loopId = card.dataset.loopId;
        const field = target.dataset.field;
        if (!field) return;
        if (field === "tags_add") return;
        if (field === "title" && target.dataset.initial === target.value.trim()) {
          return;
        }
        if (field === "status") {
          const nextStatus = target.value;
          const initialStatus = target.dataset.initial || "";
          if (nextStatus === initialStatus) return;
          if (nextStatus === "completed") {
            if (card) {
              card.dataset.pendingStatus = "completed";
              card.dataset.previousStatus = initialStatus;
              card.dataset.status = "completed";
            }
            showCompletionNote(loopId);
            return;
          }
          const transitioned = await transitionStatus(loopId, nextStatus);
          if (transitioned) {
            replaceLoop(transitioned);
          }
          return;
        }

        const payload = {};
        const nextInput = card.querySelector('[data-field="next_action"]');
        const dueInput = card.querySelector('[data-field="due_at_utc"]');
        const blockedInput = card.querySelector('[data-field="blocked_reason"]');

        if (nextInput) {
          const nextValue = nextInput.value.trim();
          const initialNext = nextInput.dataset.initial || "";
          if (nextValue !== initialNext) {
            payload.next_action = nextValue || null;
          }
        }

        const titleInput = card.querySelector('[data-field="title"]');
        if (titleInput) {
          const titleValue = titleInput.value.trim();
          const initialTitle = titleInput.dataset.initial || "";
          if (titleValue !== initialTitle) {
            payload.title = titleValue || null;
          }
        }

        if (dueInput) {
          const dueIso = isoFromLocalInput(dueInput.value);
          const initialDue = dueInput.dataset.initial || "";
          if (!dueInput.value && initialDue) {
            payload.due_at_utc = null;
          } else if (dueIso && dueIso !== initialDue) {
            payload.due_at_utc = dueIso;
          }
        }

        if (blockedInput) {
          const blockedValue = blockedInput.value.trim();
          const initialBlocked = blockedInput.dataset.initial || "";
          if (blockedValue !== initialBlocked) {
            payload.blocked_reason = blockedValue || null;
          }
        }

        if (Object.keys(payload).length) {
          const updated = await patchLoop(loopId, payload);
          if (updated) {
            replaceLoop(updated);
          }
        }
      }

      async function enrichLoop(loopId) {
        status.textContent = "Enrichment requested...";
        const response = await fetch(`/loops/${loopId}/enrich`, {
          method: "POST",
          headers: { "content-type": "application/json" },
        });
        if (!response.ok) {
          status.textContent = "Enrichment request failed.";
          return;
        }
        const loop = await response.json();
        replaceLoop(loop);
        pollLoop(loopId);
        status.textContent = "Enrichment running...";
      }

      // Attach event listeners to both inbox and nextBuckets containers
      function attachLoopCardListeners(container) {
        container.addEventListener("click", (event) => {
          const button = event.target.closest("button");
          if (!button) return;
          if (button.dataset.action === "complete") {
            showCompletionNote(button.dataset.id);
          } else if (button.dataset.action === "cancel-complete") {
            hideCompletionNote(button.dataset.id);
          } else if (button.dataset.action === "enrich") {
            enrichLoop(button.dataset.id);
          } else if (button.dataset.action === "refresh") {
            refreshLoop(button.dataset.id);
          } else if (button.dataset.action === "timer-toggle") {
            toggleTimer(button.dataset.id);
          } else if (button.dataset.action === "edit-tags") {
            const tagsWrap = button.closest(".tags-edit");
            if (tagsWrap) {
              tagsWrap.classList.add("editing");
              const input = tagsWrap.querySelector(".tag-input");
              if (input) {
                input.value = "";
                input.focus();
              }
            }
          } else if (button.dataset.action === "remove-tag") {
            const card = button.closest(".loop-card");
            if (card) {
              removeTag(card.dataset.loopId, button.dataset.tag, card);
            }
          }
        });

        container.addEventListener(
          "pointerdown",
          (event) => {
            const button = event.target.closest("button");
            if (!button || button.dataset.action !== "cancel-complete") return;
            const card = button.closest(".loop-card");
            const input = card?.querySelector(".completion-note-input");
            if (input) {
              input.dataset.skipComplete = "true";
            }
          },
          true,
        );

        container.addEventListener("focusout", (event) => {
          const target = event.target;
          if (target && target.classList && target.classList.contains("completion-note-input")) {
            if (target.dataset.skipComplete) {
              delete target.dataset.skipComplete;
              return;
            }
            const card = target.closest(".loop-card");
            const loopId = card?.dataset?.loopId;
            if (!loopId) return;
            const mode = target.dataset.mode || "complete";
            if (mode === "complete") {
              confirmComplete(loopId, target.value);
              return;
            }
            if (mode === "edit") {
              saveCompletionNote(loopId, target);
              return;
            }
            return;
          }
          if (target && target.classList && target.classList.contains("tag-input")) {
            appendTagsFromInput(target);
          }
        });

        container.addEventListener("change", (event) => {
          const target = event.target;
          if (target && target.dataset && target.dataset.field) {
            applyInlineUpdate(target);
          }
        });

        container.addEventListener("input", (event) => {
          const target = event.target;
          if (target && target.dataset && target.dataset.field === "next_action") {
            autoResizeTextarea(target);
          }
        });

        container.addEventListener(
          "focus",
          (event) => {
            const target = event.target;
            if (target && target.dataset && target.dataset.field === "next_action") {
              autoResizeTextarea(target);
            }
          },
          true,
        );

        container.addEventListener(
          "keydown",
          (event) => {
            const target = event.target;
            if (target?.dataset?.action === "completion-note") {
              const card = target.closest(".loop-card");
              const loopId = card?.dataset?.loopId;
              const mode = target.dataset.mode || "complete";
              if (event.key === "Enter" && loopId) {
                event.preventDefault();
                target.dataset.skipComplete = "true";
                if (mode === "complete") {
                  confirmComplete(loopId, target.value);
                } else if (mode === "edit") {
                  saveCompletionNote(loopId, target);
                  target.blur();
                }
              } else if (event.key === "Escape" && loopId) {
                event.preventDefault();
                target.dataset.skipComplete = "true";
                if (mode === "complete") {
                  hideCompletionNote(loopId);
                } else if (mode === "edit") {
                  target.value = target.dataset.initial || "";
                  target.blur();
                }
              }
              return;
            }
            if (!target || !target.dataset || !target.dataset.field) return;
            if (event.key === "Enter") {
              event.preventDefault();
              if (target.dataset.field === "tags_add") {
                appendTagsFromInput(target);
              } else {
                target.blur();
              }
            } else if (event.key === "Escape" && target.dataset.field === "tags_add") {
              const tagsWrap = target.closest(".tags-edit");
              target.value = "";
              if (tagsWrap) {
                tagsWrap.classList.remove("editing");
              }
            }
          },
          true,
        );
      }

      // Attach listeners to both containers
      attachLoopCardListeners(inbox);
      attachLoopCardListeners(nextBuckets);

      statusFilter.addEventListener("change", () => {
        queryFilter.value = "";
        viewFilter.value = "";
        loadInbox();
      });
      tagFilter.addEventListener("change", () => {
        queryFilter.value = "";
        viewFilter.value = "";
        loadInbox();
      });

      queryFilter.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          viewFilter.value = "";
          statusFilter.value = "all";
          tagFilter.value = "";
          loadInbox();
        }
      });

      viewFilter.addEventListener("change", () => {
        const selected = viewFilter.selectedOptions[0];
        if (selected && selected.dataset.query) {
          queryFilter.value = selected.dataset.query;
          statusFilter.value = "all";
          tagFilter.value = "";
          loadInbox();
        }
      });

      saveViewBtn.addEventListener("click", saveCurrentView);

      form.addEventListener("submit", captureLoop);
      exportBtn.addEventListener("click", exportLoops);
      importBtn.addEventListener("click", () => importFile.click());
      importFile.addEventListener("change", (event) => {
        const file = event.target.files && event.target.files[0];
        if (file) {
          importLoops(file);
        }
        importFile.value = "";
      });
      loadTags();
      loadInbox();

      // Tab Navigation
      const tabs = document.querySelectorAll(".tab");
      const inboxMain = document.getElementById("inbox-main");
      const chatMain = document.getElementById("chat-main");
      const ragMain = document.getElementById("rag-main");

      function switchTab(tabName) {
        tabs.forEach(t => {
          t.classList.toggle("active", t.dataset.tab === tabName);
          t.setAttribute("aria-selected", t.dataset.tab === tabName);
        });
        inboxMain.style.display = tabName === "inbox" ? "grid" : "none";
        nextMain.style.display = tabName === "next" ? "grid" : "none";
        chatMain.style.display = tabName === "chat" ? "grid" : "none";
        ragMain.style.display = tabName === "rag" ? "grid" : "none";

        // Load data when switching to Next tab
        if (tabName === "next") {
          loadNext();
        }
      }

      tabs.forEach(tab => tab.addEventListener("click", () => switchTab(tab.dataset.tab)));

      // Chat functionality
      let chatMessages = [];
      const chatMessagesEl = document.getElementById("chat-messages");
      const chatForm = document.getElementById("chat-form");
      const chatInput = document.getElementById("chat-input");

      function renderChatMessages() {
        if (chatMessages.length === 0) {
          chatMessagesEl.innerHTML = '<div class="chat-placeholder">Start a conversation...</div>';
          return;
        }
        chatMessagesEl.innerHTML = chatMessages.map(msg =>
          `<div class="chat-bubble ${msg.role}">${escapeHtml(msg.content)}</div>`
        ).join("");
        chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
      }

      function addChatBubble(role, content) {
        chatMessages.push({ role, content });
        renderChatMessages();
      }

      function updateLastAssistantBubble(content) {
        if (chatMessages.length && chatMessages[chatMessages.length - 1].role === "assistant") {
          chatMessages[chatMessages.length - 1].content = content;
          renderChatMessages();
        }
      }

      async function submitChat(text) {
        addChatBubble("user", text);
        addChatBubble("assistant", "");

        const messages = chatMessages.slice(0, -1).map(m => ({ role: m.role, content: m.content }));
        try {
          const response = await fetch("/chat?stream=true", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ messages, tool_mode: "none" }),
          });

          if (!response.ok) {
            updateLastAssistantBubble("Error: " + response.status);
            return;
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let accumulated = "";
          let buffer = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop() || "";

            for (const line of lines) {
              if (line.startsWith("data:")) {
                try {
                  const data = JSON.parse(line.slice(5).trim());
                  if (data.token) {
                    accumulated += data.token;
                    updateLastAssistantBubble(accumulated);
                  }
                  if (data.message !== undefined && data.token === undefined) {
                    updateLastAssistantBubble(data.message);
                  }
                } catch (e) { console.warn("SSE parse error:", e); }
              }
            }
          }
        } catch (err) {
          updateLastAssistantBubble("Connection error. Please try again.");
        }
      }

      chatForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const text = chatInput.value.trim();
        if (!text) return;
        chatInput.value = "";
        submitChat(text);
      });

      // RAG functionality
      const ragForm = document.getElementById("rag-form");
      const ragInput = document.getElementById("rag-input");
      const ragAnswer = document.getElementById("rag-answer");
      const ragAnswerText = ragAnswer.querySelector(".rag-answer-text");
      const ragSourcesList = ragAnswer.querySelector(".rag-sources-list");

      function renderRagSources(sources, chunks) {
        if (!sources || !sources.length) {
          ragSourcesList.innerHTML = '<div class="rag-source">No sources found</div>';
          return;
        }
        ragSourcesList.innerHTML = sources.map((src, idx) => {
          const chunk = chunks && chunks[idx] ? chunks[idx] : null;
          const contentPreview = chunk && chunk.content ? escapeHtml(chunk.content.substring(0, 200)) : "";
          return `
            <div class="rag-source">
              <div class="rag-source-path">${escapeHtml(src.document_path || "Unknown")}</div>
              <div class="rag-source-meta">
                Chunk ${src.chunk_index ?? "?"} · Score: ${(src.score ?? 0).toFixed(3)}
              </div>
              ${contentPreview ? `<div class="rag-source-content">${contentPreview}${chunk.content.length > 200 ? '...' : ''}</div>` : ''}
            </div>
          `;
        }).join("");
      }

      async function submitRagQuestion(question) {
        ragAnswer.style.display = "block";
        ragAnswerText.textContent = "Thinking...";
        ragSourcesList.innerHTML = "";

        try {
          const response = await fetch(`/ask?q=${encodeURIComponent(question)}&stream=true`);
          if (!response.ok) {
            ragAnswerText.textContent = "Error: " + response.status;
            return;
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let accumulated = "";
          let sources = [];
          let chunks = [];
          let buffer = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop() || "";

            for (const line of lines) {
              if (line.startsWith("data:")) {
                try {
                  const data = JSON.parse(line.slice(5).trim());
                  if (data.token) {
                    accumulated += data.token;
                    ragAnswerText.textContent = accumulated;
                  }
                  if (data.sources) {
                    sources = data.sources;
                  }
                  if (data.chunks) {
                    chunks = data.chunks;
                  }
                  if (data.answer !== undefined && data.token === undefined) {
                    ragAnswerText.textContent = data.answer;
                  }
                } catch (e) { console.warn("SSE parse error:", e); }
              }
            }
          }

          renderRagSources(sources, chunks);
        } catch (err) {
          ragAnswerText.textContent = "Connection error. Please try again.";
        }
      }

      ragForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const question = ragInput.value.trim();
        if (!question) return;
        ragInput.value = "";
        submitRagQuestion(question);
      });

      // Next View Functionality
      const BUCKET_CONFIG = {
        due_soon: { icon: "🔥", title: "Due Soon", description: "Tasks with upcoming deadlines" },
        quick_wins: { icon: "⚡", title: "Quick Wins", description: "Low effort, high impact" },
        high_leverage: { icon: "🎯", title: "High Leverage", description: "High importance tasks" },
        standard: { icon: "📋", title: "Standard", description: "Other actionable tasks" }
      };

      function renderPriorityBadges(loop) {
        const badges = [];
        if (loop.urgency != null) {
          const urgencyClass = loop.urgency >= 0.7 ? "priority-urgency" : "";
          badges.push(`<span class="priority-score ${urgencyClass}">⚡${(loop.urgency * 100).toFixed(0)}%</span>`);
        }
        if (loop.importance != null) {
          const importanceClass = loop.importance >= 0.7 ? "priority-importance" : "";
          badges.push(`<span class="priority-score ${importanceClass}">★${(loop.importance * 100).toFixed(0)}%</span>`);
        }
        if (loop.activation_energy != null) {
          const energyIcons = ["", "🔋", "🔋🔋", "🔋🔋🔋"];
          badges.push(`<span class="priority-score priority-energy">${energyIcons[loop.activation_energy] || ""}</span>`);
        }
        return badges.join("");
      }

      function renderNextBucket(bucketKey, loops) {
        const config = BUCKET_CONFIG[bucketKey] || BUCKET_CONFIG.standard;
        const bucketDiv = document.createElement("div");
        bucketDiv.className = `next-bucket bucket-${bucketKey}`;

        if (!loops || loops.length === 0) {
          bucketDiv.innerHTML = `
            <div class="next-bucket-header">
              <span class="next-bucket-icon">${config.icon}</span>
              <h3 class="next-bucket-title">${config.title}</h3>
              <span class="next-bucket-count">0</span>
            </div>
            <div class="next-bucket-empty">No tasks in this bucket</div>
          `;
          return bucketDiv;
        }

        const listDiv = document.createElement("div");
        listDiv.className = "next-bucket-list";
        loops.forEach(loop => {
          const card = renderLoop(loop);
          // Add priority badges to the card's badges section
          const badgesDiv = card.querySelector(".badges");
          if (badgesDiv) {
            const priorityHtml = renderPriorityBadges(loop);
            if (priorityHtml) {
              badgesDiv.insertAdjacentHTML("afterbegin", priorityHtml);
            }
          }
          listDiv.appendChild(card);
        });

        bucketDiv.innerHTML = `
          <div class="next-bucket-header">
            <span class="next-bucket-icon">${config.icon}</span>
            <h3 class="next-bucket-title">${config.title}</h3>
            <span class="next-bucket-count">${loops.length}</span>
          </div>
        `;
        bucketDiv.appendChild(listDiv);

        return bucketDiv;
      }

      async function loadNext() {
        nextBuckets.innerHTML = '<div class="rag-placeholder">Loading prioritized tasks...</div>';

        try {
          const response = await fetch("/loops/next?limit=10");
          if (!response.ok) {
            nextBuckets.innerHTML = '<div class="rag-placeholder">Failed to load next actions.</div>';
            return;
          }

          const data = await response.json();
          nextBuckets.innerHTML = "";

          // Render buckets in priority order
          const bucketOrder = ["due_soon", "quick_wins", "high_leverage", "standard"];
          for (const key of bucketOrder) {
            const bucketDiv = renderNextBucket(key, data[key] || []);
            nextBuckets.appendChild(bucketDiv);
          }

          // Wire up event handlers for the new cards
          queueNextActionResize(nextBuckets);
        } catch (err) {
          nextBuckets.innerHTML = '<div class="rag-placeholder">Error loading next actions.</div>';
          console.error("loadNext error:", err);
        }
      }

      // Add refresh button handler
      refreshNextBtn.addEventListener("click", loadNext);
    </script>
  </body>
</html>
