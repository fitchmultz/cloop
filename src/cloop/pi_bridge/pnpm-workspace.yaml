# Pi bridge tracks audited Pi releases promptly; keep same-day supply-chain
# exceptions exact and scoped so pnpm's default minimum release age still applies broadly.
minimumReleaseAgeExclude:
  - '@earendil-works/pi-agent-core@0.78.1'
  - '@earendil-works/pi-ai@0.78.1'
  - '@earendil-works/pi-coding-agent@0.78.1'
  - '@earendil-works/pi-tui@0.78.1'

allowBuilds:
  '@google/genai': true
  koffi: true
  protobufjs: true
