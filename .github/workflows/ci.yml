name: CI (PR Fast Gate)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-pr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks (py3.14.3)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.11.2"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.3"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "25.8.2"
          cache: pnpm
          cache-dependency-path: |
            src/cloop/pi_bridge/pnpm-lock.yaml
            frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Run quality-only local gate
        run: make quality

  tests_fast:
    name: Fast tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        python-version: ["3.14.3"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.11.2"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "25.8.2"
          cache: pnpm
          cache-dependency-path: |
            src/cloop/pi_bridge/pnpm-lock.yaml
            frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Run fast test subset
        run: make test-fast
