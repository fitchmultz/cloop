name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.11.2"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.3"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "25.8.2"
          cache: pnpm
          cache-dependency-path: src/cloop/pi_bridge/pnpm-lock.yaml

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Install dependencies
        run: uv sync --locked --all-groups --all-extras

      - name: Run release local gate (excludes performance marker)
        run: make ci

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
