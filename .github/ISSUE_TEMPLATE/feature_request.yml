name: Feature request
description: Propose a new capability or significant improvement.
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the user/problem outcome first, then the implementation idea.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user or operational pain are you solving?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe behavior, APIs/CLI changes, and expected UX.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches and why they were not chosen.

  - type: textarea
    id: scope
    attributes:
      label: Scope and risks
      description: Data migrations, compatibility impact, rollout risk, and testing plan.

  - type: checkboxes
    id: docs_tests
    attributes:
      label: Completeness checklist
      options:
        - label: I identified docs updates needed in README or docs/*.
          required: true
        - label: I identified tests needed for success and failure modes.
          required: true
