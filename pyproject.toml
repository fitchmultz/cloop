[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cloop"
version = "0.1.0"
description = "Local-first FastAPI service for chat and RAG."
readme = "README.md"
requires-python = ">=3.14,<3.15"
authors = [{name = "Cloop"}]
dependencies = [
    "fastapi>=0.111.0",
    "uvicorn[standard]>=0.30.0",
    "pydantic>=2.9.0",
    "numpy>=2.0.0",
    "litellm>=1.41.0",
    "pypdf>=4.1.0",
]

[project.optional-dependencies]
dev = [
    "basedpyright>=1.17.0",
    "ruff>=0.6.0",
    "pytest>=8.3.0",
    "httpx>=0.27.0",
    "hypothesis>=6.108.0",
]


[tool.ruff]
line-length = 100
target-version = "py314"
fix = false

[tool.ruff.lint]
select = ["E", "F", "B", "I"]

[tool.basedpyright]
typeCheckingMode = "standard"
reportMissingImports = false
